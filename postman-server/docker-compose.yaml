version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      target: production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    command: ["node", "dist/app.js"]   

  scheduler:
    build:
      context: .
      target: production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: ["node", "dist/scheduler/scheduler.entry.js"]  
    depends_on:
      - api
      - redis
      - postgres

  worker:
    build:
      context: .
      target: production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    command: ["node", "dist/workers/worker.entry.js"]       
    depends_on:
      - api
      - redis
      - postgres
    deploy:
      replicas: 1 # Start with 1 replica, can be scaled up as needed using `docker-compose up --scale worker=3`

volumes:
  postgres_data: