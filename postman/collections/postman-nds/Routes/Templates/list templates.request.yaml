$kind: http-request
name: List Templates
method: GET
url: '{{baseUrl}}/templates'
order: 1000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Content-Type is JSON", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      pm.test("Response is an array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("Each template has required fields", function () {
        const json = pm.response.json();
        json.forEach(function (template) {
          pm.expect(template).to.have.property("id");
          pm.expect(template).to.have.property("key");
          pm.expect(template).to.have.property("name");
          pm.expect(template).to.have.property("channel");
          pm.expect(template).to.have.property("bodyTemplate");
          pm.expect(template).to.have.property("version");
          pm.expect(template).to.have.property("isActive");
          pm.expect(template).to.have.property("createdAt");
          pm.expect(template).to.have.property("updatedAt");
        });
      });

      pm.test("Channel values are valid", function () {
        const validChannels = ["EMAIL", "SMS", "IN_APP"];
        const json = pm.response.json();
        json.forEach(function (template) {
          pm.expect(validChannels).to.include(template.channel);
        });
      });
